<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    .tela {
    display: none;
}

.ativa {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Fundo mais moderno */
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #9F96BD, #67E191);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Caixa central estilo app */
.tela.ativa {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 280px;
}

/* Título */
h1 {
    margin-bottom: 20px;
    color: #333;
}

/* Inputs mais bonitos */
input {
    margin: 8px 0;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

/* Efeito ao clicar no input */
input:focus {
    border-color: #9F96BD;
    box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

/* Botões */
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #9F96BD;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
button:hover {
    background: #9F96BD;
}

/* Botão voltar diferente */
button:last-child {
    background: #ccc;
    color: black;
}

button:last-child:hover {
    background: #aaa;
}
</style>

</head>
<body>
    <div id="menu" class="tela ativa">
        <h1>FocoVest</h1>
        <button onclick ="abrirCadastro()">CADASTRAR</button>
        <button onclick="abrirLogin()">LOGIN</button>
    </div>

    <div id="cadastro" class="tela">
        <h1>Cadastro</h1>
        <input id="email_cad" placeholder="Email">
        <input id="senha_cad" placeholder="senha" type="password">
        <input id="nome_cad" placeholder="Nome">
        <input id="idade_cad" placeholder="Idade" type="number">

        <button onclick="cadastrar()">Cadastrar</button>

        <button onclick="voltarMenu()">Voltar</button>
    </div>

    <div id="login" class="tela">
        <h1>Login</h1>

        <input id="email_log" placeholder="Email">
        <input id="senha_log" placeholder="senha" type="password">

        <button onclick="entrar()">Entrar</button>

        <button onclick="voltarMenu()">Voltar</button>
    </div>

    <div id="home" class="tela">
        <h1>Bem-vindo ao FocoVest</h1>
    </div>

    <script>
        function mostrarTela(id) {
            document.querySelectorAll(".tela").forEach(t => {
                t.classList.remove("ativa");
            });

            document.getElementById(id).classList.add("ativa");

        }

        function abrirCadastro(){
            mostrarTela("cadastro");
        }

        function abrirLogin(){
            mostrarTela("login");
        }

        function abrirHome(){
            mostrarTela("home")
        }

        function voltarMenu(){
            mostrarTela("menu");
        }

        async function cadastrar() {
            const dados = {
                email: document.getElementById("email_cad").value,
                senha: document.getElementById("senha_cad").value,
                nome: document.getElementById("nome_cad").value,
                idade: Number(document.getElementById("idade_cad").value)
            };

            const resposta = await fetch("http://127.0.0.1:8000/cadastro", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            const json = await resposta.json();
            if (json.msg === "usuario cadastrado"){
                abrirHome()
            
            } else {
                alert(json.msg)
            }
        }

        async function entrar() {
            const dados = {
                email: document.getElementById("email_log").value,
                senha: document.getElementById("senha_log").value,
            };

            const resposta = await fetch("http://127.0.0.1:8000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            const json = await resposta.json();

            if (json.msg === "Login efetuado"){
                alert(json.msg);
                abrirHome()
            } else{
                alert(json.msg);
            }
        }

    </script>
</body>
</html>
